            <span class="text-surface-900 dark:text-surface-0 font-medium text-2xl leading-normal">SAKAI</span>
        </a>
    </div>

    <!-- Navigation menu centered on desktop -->
    <div class="hidden lg:flex flex-1 justify-center">
        <ul class="list-none p-0 m-0 flex items-center select-none gap-8">
            <li>
                <a (click)="router.navigate(['/landing'], { fragment: 'home' })" pRipple class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                    <span>Home</span>
                </a>
            </li>
            <li>
                <a (click)="router.navigate(['/landing'], { fragment: 'features' })" pRipple class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                    <span>Features</span>
                </a>
            </li>
            <li>
                <a (click)="router.navigate(['/landing'], { fragment: 'highlights' })" pRipple class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                    <span>Highlights</span>
                </a>
            </li>
            <li>
                <a (click)="router.navigate(['/landing'], { fragment: 'pricing' })" pRipple class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                    <span>Pricing</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- Action buttons on the right -->
    <div class="flex gap-2">
        <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()">
            <i [ngClass]="{ 'pi ': true, 'pi-moon': layoutService.isDarkTheme(), 'pi-sun': !layoutService.isDarkTheme() }"></i>
        </button>
        <button class="layout-topbar-action layout-topbar-action-highlight" pStyleClass="@next" enterFromClass="hidden" enterActiveClass="animate-scalein" leaveToClass="hidden" leaveActiveClass="animate-fadeout" [hideOnOutsideClick]="true">
            <i class="pi pi-palette"></i>
        </button>
    </div>
</div>

<!-- Mobile menu -->
<div id="mobileMenu" class="lg:hidden bg-surface-0 dark:bg-surface-900 absolute w-full left-0 top-full px-6 py-4 z-20 border-t border-surface-200 dark:border-surface-700 hidden">
    <ul class="list-none p-0 m-0 flex flex-col items-center select-none gap-4">
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'home' })" pRipple class="px-0 py-2 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Home</span>
            </a>
        </li>
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'features' })" pRipple class="px-0 py-2 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Features</span>
            </a>
        </li>
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'highlights' })" pRipple class="px-0 py-2 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Highlights</span>
            </a>
        </li>
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'pricing' })" pRipple class="px-0 py-2 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Pricing</span>
            </a>
        </li>
    </ul>
</div>

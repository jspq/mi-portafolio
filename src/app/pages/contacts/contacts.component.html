<div class="container my-5 text-center">
    <h2 class="text-center">Contáctame</h2>
    <p class="text-muted">Puedes contactarme a través de mis redes sociales o llamarme directamente.</p>

    <div class="d-flex justify-content-center gap-3 mt-4">
        <a [href]="whatsappLink" target="_blank" class="btn btn-success"> <i class="bi bi-whatsapp"></i> WhatsApp </a>
        <a [href]="telegramLink" target="_blank" class="btn btn-primary"> <i class="bi bi-telegram"></i> telegram </a>
        <a [href]="instagramLink" target="_blank" class="btn btn-danger"> <i class="bi bi-instagram"></i> Instagram </a>
        <a [href]="linkedinLink" target="_blank" class="btn btn-primary"> <i class="bi bi-linkedin"></i> LinkedIn </a>
        <a [href]="phoneCallLink" class="btn btn-dark"> <i class="bi bi-telephone"></i> Llamar </a>
    </div>
</div>
